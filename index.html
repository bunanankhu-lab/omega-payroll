<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>โอเมก้าอีสาน · ระบบงานภายใน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FBF9F6;
    --text: #1C1C1C;
    --muted: #7A736A;
    --border: rgba(28, 28, 28, 0.10);
    --card: rgba(255, 255, 255, 0.72);
    --primary-grad: linear-gradient(135deg, #A38A5E 0%, #8E754A 100%);
    --shadow: 0 1px 2px rgba(28,28,28,.04), 0 4px 14px rgba(120,100,70,.08);
  }
  html[data-theme="midnight"] {
    --bg: #0B0F19;
    --text: #E2E8F0;
    --muted: #94A0B4;
    --border: rgba(226, 232, 240, 0.08);
    --card: rgba(22, 28, 42, 0.62);
    --primary-grad: linear-gradient(135deg, #D4AF37 0%, #B8942A 100%);
    --shadow: 0 1px 2px rgba(0,0,0,.35), 0 4px 14px rgba(0,0,0,.45);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; font-family: "IBM Plex Sans Thai", "Noto Sans Thai", "Segoe UI", Tahoma, sans-serif;
    background: var(--bg); color: var(--text); overflow: hidden;
  }
  .bar {
    height: 58px; display: flex; align-items: center; gap: 10px; padding: 0 12px;
    border-bottom: 1px solid var(--border); background: var(--bg);
  }
  .bar .logo {
    height: 38px; width: auto; background: #fff; border: 1px solid var(--border);
    border-radius: 9px; padding: 3px 6px; flex-shrink: 0;
  }
  .bar .name { font-weight: 700; font-size: .95rem; white-space: nowrap; }
  @media (max-width: 560px) { .bar .name { display: none; } }
  .tabs { display: flex; gap: 6px; margin-left: auto; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tabs button {
    background: var(--card); border: 1px solid var(--border); color: var(--muted);
    border-radius: 999px; padding: 9px 15px; cursor: pointer; font-size: .88rem;
    font-weight: 600; font-family: inherit; box-shadow: var(--shadow); white-space: nowrap;
    transition: all .15s; flex-shrink: 0;
  }
  .tabs button:hover { color: var(--text); }
  .tabs button.active {
    background: var(--primary-grad); color: #fff; border-color: transparent;
    box-shadow: 0 3px 10px rgba(163,138,94,.35);
  }
  main { height: calc(100vh - 58px); height: calc(100dvh - 58px); }
  main iframe { width: 100%; height: 100%; border: 0; display: none; background: var(--bg); }
  main iframe.show { display: block; }
  [hidden] { display: none !important; }
</style>
</head>
<body>
<div class="bar">
  <img class="logo" src="logo.png" alt="โลโก้บริษัท">
  <span class="name">โอเมก้าอีสาน</span>
  <nav class="tabs">
    <button type="button" data-app="payroll">🧮 เงินเดือน</button>
    <button type="button" data-app="crm">🤝 CRM ลูกค้า</button>
    <button type="button" data-app="pm">🔧 เตือนรอบ PM</button>
  </nav>
</div>
<main id="frames"></main>

<script>
(function () {
  "use strict";

  var APPS = {
    payroll: { src: "payroll.html", title: "ระบบเงินเดือนพนักงาน · บริษัทโอเมก้าอีสาน" },
    crm:     { src: "crm.html",     title: "ระบบ CRM ลูกค้าสัมพันธ์ · บริษัทโอเมก้าอีสาน" },
    pm:      { src: "pm.html?v=3",  title: "ระบบเตือนรอบ PM · บริษัทโอเมก้าอีสาน" }
  };
  var TAB_KEY = "omega_shell_tab";
  var THEME_KEY = "omega_payroll_theme";
  var frames = {};
  var framesWrap = document.getElementById("frames");

  // เปิดแอปครั้งแรกค่อยโหลด iframe และเก็บไว้ ไม่โหลดใหม่เวลาสลับ (สถานะไม่หาย)
  function show(app) {
    if (!APPS[app]) app = "payroll";
    Object.keys(frames).forEach(function (k) { frames[k].classList.remove("show"); });
    if (!frames[app]) {
      var f = document.createElement("iframe");
      f.src = APPS[app].src;
      f.title = APPS[app].title;
      frames[app] = f;
      framesWrap.appendChild(f);
    }
    frames[app].classList.add("show");
    document.querySelectorAll(".tabs button").forEach(function (b) {
      b.classList.toggle("active", b.getAttribute("data-app") === app);
    });
    document.title = APPS[app].title;
    try { localStorage.setItem(TAB_KEY, app); } catch (e) {}
    if (location.hash !== "#" + app) history.replaceState(null, "", "#" + app);
  }

  document.querySelectorAll(".tabs button").forEach(function (b) {
    b.addEventListener("click", function () { show(b.getAttribute("data-app")); });
  });
  window.addEventListener("hashchange", function () { show(location.hash.slice(1)); });

  // ธีมตามหน้าเงินเดือน/CRM (คีย์เดียวกัน) — เช็กเป็นระยะเผื่อผู้ใช้สลับธีมในแอปข้างใน
  function syncTheme() {
    var t = "quiet";
    try { t = localStorage.getItem(THEME_KEY) || "quiet"; } catch (e) {}
    document.documentElement.setAttribute("data-theme", t === "midnight" ? "midnight" : "quiet");
  }
  syncTheme();
  setInterval(syncTheme, 1500);

  var initial = location.hash.slice(1);
  if (!APPS[initial]) {
    try { initial = localStorage.getItem(TAB_KEY) || "payroll"; } catch (e) { initial = "payroll"; }
  }
  show(initial);
})();
</script>
</body>
</html>
